<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aleksander Zakrzewski (57706) - PTW LAB C</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
<div class="container">
    <div class="map-section">
        <div class="map-controls">
            <button id="locationBtn" class="btn btn-location">Moja lokalizacja</button>
            <button id="downloadBtn" class="btn btn-download">Pobierz mapę</button>
            <div id="coordinates" class="coordinates-display">Brak lokalizacji</div>
        </div>
        <div id="map" class="map-container"></div>
    </div>

    <div class="puzzle-container">
        <div class="puzzle-board-section">
            <div class="board-header">
                <h2>Tablica do układania</h2>
                <div id="puzzleProgress" class="progress-info">Ułożone: 0/16</div>
            </div>
            <div id="puzzleBoard" class="puzzle-board"></div>
        </div>

        <div class="puzzle-pool-section">
            <h2>Dostępne puzzle</h2>
            <div id="puzzlePool" class="puzzle-pool"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js"></script>
<script src="scripts.js" defer></script>
</body>
</html>
