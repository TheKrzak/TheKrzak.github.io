<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aleksander Zakrzewski (57706) - PTW LAB C</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
    <div class="container">
        <!-- Sekcja mapy -->
        <div class="map-section">
            <div class="map-controls">
                <button id="locationBtn" class="btn btn-location">📍 Moja lokalizacja</button>
                <button id="downloadBtn" class="btn btn-download">💾 Pobierz mapę</button>
                <button id="toggleSatelliteBtn" class="btn btn-satellite">🛰️ Przełącz widok</button>
                <div id="coordinates" class="coordinates-display"></div>
            </div>
            <div id="map" class="map-container"></div>
        </div>

        <!-- Sekcja puzzle - layout pionowy z dwoma obszarami -->
        <div class="puzzle-container">
            <!-- Obszar do układania puzzle -->
            <div class="puzzle-board-section">
                <h2>Tablica do składania</h2>
                <div class="puzzle-info">
                    <div id="puzzleProgress" class="progress-info">Postęp: 0/16</div>
                </div>
                <div id="puzzleBoard" class="puzzle-board"></div>
            </div>

            <!-- Pula dostępnych puzzle -->
            <div class="puzzle-pool-section">
                <h2>Dostępne puzzle</h2>
                <div id="puzzlePool" class="puzzle-pool"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="scripts.js" defer></script>
</body>
</html>
