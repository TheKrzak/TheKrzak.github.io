{% extends 'layout.html' %}

{% block content %}
<div style="padding: 20px; max-width: 400px;">
    <h2>Dodaj nowy samochód do bazy</h2>
    
    <form method="post" style="margin-top: 20px; display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; margin-bottom: 5px;"><strong>Marka (Brand):</strong></label>
            <input type="text" name="Brand" placeholder="np. Ford" required style="width: 100%; padding: 8px;">
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 5px;"><strong>Model:</strong></label>
            <input type="text" name="Model" placeholder="np. Focus" required style="width: 100%; padding: 8px;">
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 5px;"><strong>Rok produkcji (Year):</strong></label>
            <input type="number" name="Year" placeholder="np. 2018" required style="width: 100%; padding: 8px;">
        </div>
        
        <button type="submit" style="padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold;">
            💾 Zapisz pojazd
        </button>
    </form>
    
    <p style="margin-top: 20px;">
        <a href="{{ url_for('index') }}">⬅ Anuluj i wróć do listy</a>
    </p>
</div>
{% endblock %}
